name: Hot Wheels Full Re-scrape

on:
  schedule:
    # Run on the 1st and 15th of every month at 06:00 UTC
    - cron: '0 6 1,15 * *'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'

jobs:
  scrape-full:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full scrape (all years 1968-current)
        run: python -m src.main --all
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Print stats
        run: |
          echo "📅 Full re-scrape completed at $(date)"
          echo "✅ All years refreshed in Supabase"
